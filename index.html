<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lossless Video LLC</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: linear-gradient(to bottom, #111, #000);
      border-bottom: 1px solid #222;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f5b400;
      font-weight: bold;
    }

    .logo img {
      height: 40px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #aaa;
      font-size: 14px;
    }

    nav a:hover {
      color: #f5b400;
    }

    .cta {
      background: linear-gradient(145deg, #f5b400, #ffcc33);
      border: none;
      padding: 10px 18px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      height: 80vh;
      padding: 40px;
      gap: 30px;
    }

    .hero-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid #333;
      padding: 30px;
      background: rgba(0,0,0,0.7);
      box-shadow: 0 0 20px rgba(255, 180, 0, 0.1);
    }

    .hero-left h1 {
      font-size: 48px;
      color: #f5b400;
      margin: 20px 0;
    }

    .hero-left p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .tag {
      font-size: 12px;
      color: #f5b400;
      margin-bottom: 10px;
    }

    .hero-buttons button {
      margin-right: 10px;
      padding: 10px 18px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #f5b400;
      color: black;
    }

    .secondary {
      background: transparent;
      border: 1px solid #f5b400;
      color: #f5b400;
    }

    /* HERO IMAGE */
    .hero-right {
      flex: 1;
      background: url('assets/images/L_hero.png') center/cover no-repeat;
      border: 1px solid #333;
      box-shadow: 0 0 20px rgba(255, 180, 0, 0.1);
    }

    /* FEATURED PROJECTS */
    .projects {
      padding: 40px;
    }

    .projects h2 {
      margin-bottom: 20px;
    }

    .project-grid {
      display: flex;
      gap: 15px;
    }

    .card {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      padding: 20px;
      text-align: center;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <img src="assets/images/L_logo.png" alt="logo">
      LOSSLESS VIDEO
    </div>

    <nav>
      <a href="#">HOME</a>
      <a href="#">WORK</a>
      <a href="#">SERVICES</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </nav>

    <button class="cta">START PROJECT</button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <div class="tag">SYSTEM READY</div>
      <h1>LOSSLESS VIDEO</h1>

      <p>Music Videos / Commercials / Films / Corporate</p>
      <p>Cinematic video production for artists, brands, and businesses.</p>

      <div class="hero-buttons">
        <button class="secondary">VIEW WORK</button>
        <button class="primary">START PROJECT</button>
      </div>
    </div>

    <div class="hero-right"></div>
  </section>

  <!-- PROJECTS -->
  <section class="projects">
    <h2>FEATURED PROJECTS</h2>

    <div class="project-grid">
      <div class="card">DONALD</div>
      <div class="card">JOE</div>
      <div class="card">STATIC</div>
      <div class="card">BRAND</div>
    </div>
  </section>

</body>
</html>
